        function loadKategori(containerId, dataList) {

    const container =
        document.getElementById(containerId);

    container.innerHTML = "";

    dataList.forEach(item => {

        const box =
            document.createElement("div");

        box.className = "box";

        box.innerText = item;

        box.onclick = () => {
            openProdukPage(item);
        };

        container.appendChild(box);

    });

	}

function filterList(inputId, containerId, dataList) {

    const keyword =
        document.getElementById(inputId)
        .value
        .toLowerCase();

    const container =
        document.getElementById(containerId);

    container.innerHTML = "";

    dataList.forEach(item => {

        if (item.toLowerCase().includes(keyword)) {

            const box = document.createElement("div");

            box.className = "box";
            box.innerText = item;

            box.onclick = () => {
                openProdukPage(item);
            };

            container.appendChild(box);
        }

    });

}

/* =====================================

===================================== */
	
function searchHome() {
	
	const keyword =
        document.getElementById("searchHome")
        .value
        .toLowerCase()
        .trim();

    const container =
        document.getElementById("homeSearchResult");

	const menuKategori =
    document.getElementById("menuKategori");

	container.innerHTML = "";

	if (!keyword) {

    menuKategori.style.display = "flex";

    return;
}

menuKategori.style.display = "none";
			 
    // Cari kategori & subkategori

    semuaKategori.forEach(item => {

        if (
            item.toLowerCase()
            .includes(keyword)
        ) {

            const box =
                document.createElement("div");

            box.className = "box";

            box.innerText = item;

            box.onclick = () => {
                openProdukPage(item);
            };

            container.appendChild(box);

        }

    });

    // Cari produk

    const products = semuaProduk;

    products.forEach(product => {

        if (
            product.nama
            .toLowerCase()
            .includes(keyword)
        ) {

            const box =
                document.createElement("div");

            box.className = "box";

            box.innerHTML = `
                <img src="${product.gambar}">
                <p>${product.nama}</p>
            `;

            box.onclick = () => {
                window.open(
                    product.link,
                    "_blank"
                );
            };

            container.appendChild(box);

        }

    });

	}

        );

    },
    { once: true }
);

music.volume = 0.1; // 10%

function toggleMusic(){

    const music =
        document.getElementById("bgMusic");

    const btn =
        document.getElementById("musicBtn");

    if(music.paused){

        music.play();
        btn.innerHTML = "🔊";

    }else{

        music.pause();
        btn.innerHTML = "🔇";

    }
}
