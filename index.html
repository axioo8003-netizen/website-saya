<!-- meta = memberi instruksi ke browser tentang cara menampilkan halaman -->
<!-- name="viewport" = mengatur tampilan di perangkat (HP/laptop) -->
<!-- content = isi pengaturan viewport -->
<!-- width=device-width = lebar halaman mengikuti lebar layar perangkat -->
<!-- initial-scale=1.0 = zoom awal normal (100%) -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- body = seluruh isi halaman yang akan terlihat oleh pengguna -->
<!-- style = cara cepat memberi aturan tampilan langsung di HTML -->
<!-- background-image = memberi gambar sebagai latar belakang halaman -->
<!-- url('background.jpg') = mengambil file gambar bernama background.jpg -->
<body style="background-image: url('background.jpg');">

<!-- h1 = judul paling besar dan paling penting di halaman -->
<!-- "Nama Website Saya" = teks yang akan muncul sebagai judul -->
<h1>Nama Website Saya</h1>

<!-- penutup body = menandakan akhir dari isi halaman website -->
</body>
